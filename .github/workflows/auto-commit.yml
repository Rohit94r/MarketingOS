name: Auto Daily Commit

on:
  schedule:
    - cron: '30 18 * * *'   # 12:00 AM IST daily
  workflow_dispatch:

permissions:
  contents: write   # ✅ required to push changes

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Make Daily Change
        run: |
          echo "Last updated: $(date)" >> activity-log.md

      - name: Commit & Push
        run: |
          git config --global user.name "Rohit94r"
          git config --global user.email "rjdhav66@gmail.com"

          git add .
          git commit -m "Auto daily commit" || echo "No changes"
          git push