name: Auto Daily 4 Commits

on:
  schedule:
    - cron: '30 7 * * *'   # 1:00 PM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Make 4 Commits Daily
        run: |
          # Initialize day counter
          if [ ! -f day.txt ]; then echo 1 > day.txt; fi
          day=$(cat day.txt)

          messages=(
          "Setup project structure with FastAPI and Next.js"
          "Built backend API and health check"
          "Connected frontend with backend"
          "Configured database and models"
          "Implemented authentication system"
          "Built frontend auth UI"
          "Designed dashboard layout"
          "Integrated AI features"
          "Created content generator UI"
          "Implemented post system"
          "Built listing and detail pages"
          "Added edit/delete functionality"
          "Implemented scheduler system"
          "Built calendar view"
          "Added activity tracking"
          "Improved UI/UX"
          "Enhanced error handling"
          "Optimized performance"
          "Added analytics"
          "Improved AI responses"
          "Built reusable templates"
          "Added user settings"
          "Implemented pricing system"
          "Improved validation"
          "Refactored code structure"
          "Enhanced API performance"
          "Added integrations base"
          "Built automation system"
          "Improved UI responsiveness"
          "Added logs system"
          "Improved developer experience"
          "Added testing fixes"
          "Refined UI animations"
          "Optimized backend queries"
          "Improved API structure"
          "Enhanced security"
          "Improved documentation"
          "Final UI polish"
          "Performance improvements"
          "Final MVP cleanup"
          )

          if [ "$day" -le 40 ]; then

            # Your verified GitHub identity
            git config user.name "Rohit Jadhav"
            git config user.email "rjdhav67@gmail.com"

            # Current date (UTC)
            DATE=$(date -u +%Y-%m-%d)

            # 4 realistic commit times (IST → UTC)
            times=("04:30:00" "07:30:00" "10:30:00" "13:30:00")

            for i in {1..4}
            do
              echo "Day $day - ${messages[$((day-1))]} - Commit $i" >> activity-log.md

              export GIT_AUTHOR_DATE="${DATE}T${times[$((i-1))]}Z"
              export GIT_COMMITTER_DATE="${DATE}T${times[$((i-1))]}Z"

              git add .
              git commit -m "Day $day - ${messages[$((day-1))]} (Commit $i)" || echo "No changes"
            done

            # Move to next day
            echo $((day+1)) > day.txt

            # Push safely
            git push origin HEAD:main

          else
            echo "Completed all 40 days 🚀" >> activity-log.md
          fi